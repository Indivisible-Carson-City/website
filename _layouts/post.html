---
layout: default
---

<article class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <header class="mb-4">
        <h1>{{ page.title }}</h1>
        <p class="text-muted">
          {{ page.date | date: "%B %-d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}
        </p>
        {% if page.tags.size > 0 %}
        <div class="mb-3">
          {% for tag in page.tags %}
          <span class="badge bg-secondary">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </header>

      {% if page.image %}
      <img src="{{ page.image | relative_url }}" class="img-fluid rounded mb-4" alt="{{ page.title }}">
      {% endif %}

      <div class="post-content">
        {{ content }}
      </div>

      <hr class="my-5">
      <div class="text-center">
        <a href="{{ '/blog' | relative_url }}" class="btn btn-outline-primary">&larr; Back to Blog</a>
      </div>
    </div>
  </div>
</article>
