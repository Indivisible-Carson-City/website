---
layout: default
title: Blog
---

<div class="container py-5">
  <h1 class="mb-4">Blog</h1>

  {% if site.posts.size > 0 %}
  <div class="row">
    {% for post in site.posts %}
      {% include post-card.html post=post %}
    {% endfor %}
  </div>
  {% else %}
  <p class="text-muted">No posts yet. Check back soon!</p>
  {% endif %}
</div>
