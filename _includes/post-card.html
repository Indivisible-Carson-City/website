<div class="col-md-4 mb-4">
  <div class="card h-100 border-0 shadow-sm">
    {% if post.image %}
    <img src="{{ post.image | relative_url }}" class="card-img-top" alt="{{ post.title }}">
    {% endif %}
    <div class="card-body">
      <h5 class="card-title">
        <a href="{{ post.url | relative_url }}" class="text-decoration-none">{{ post.title }}</a>
      </h5>
      <p class="card-text text-muted small">{{ post.date | date: "%B %-d, %Y" }}{% if post.author %} &middot; {{ post.author }}{% endif %}</p>
      <p class="card-text">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    </div>
    <div class="card-footer bg-transparent border-0 pb-3">
      <a href="{{ post.url | relative_url }}" class="btn btn-outline-primary btn-sm">Read more</a>
    </div>
  </div>
</div>
